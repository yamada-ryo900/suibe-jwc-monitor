name: SUIBE JWC Student Notice Monitor

on:
  workflow_dispatch:
  schedule:
    # UTC time. This runs at 08:17, 16:17, and 00:17 in China Standard Time.
    - cron: "17 0,8,16 * * *"

permissions:
  contents: write

concurrency:
  group: suibe-jwc-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check notices
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
        run: node jwc_student_notice_monitor.mjs --once

      - name: Save notice state
        run: |
          if git diff --quiet -- jwc_student_notice_state.json; then
            echo "No state changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jwc_student_notice_state.json
          git commit -m "Update JWC notice monitor state"
          git push
